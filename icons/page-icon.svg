<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
    <!-- Definição de Gradientes Modernos -->
    <defs>
        <linearGradient id="chromeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a73e8" />
            <stop offset="100%" stop-color="#1557b0" />
        </linearGradient>
    </defs>

    <!-- Fundo Sutil de Grade de Transparência (Representando o PNG) -->
    <rect x="2" y="2" width="20" height="20" rx="4" fill="#f1f3f4" />
    <path d="M2 6h20M2 10h20M2 14h20M2 18h20M6 2v20M10 2v20M14 2v20M18 2v20" stroke="#ffffff" stroke-width="0.75" />

    <!-- Símbolo da Curva Vetorial (Representando o SVG de Origem) -->
    <path d="M5 19C5 12 10 7 17 7" fill="none" stroke="url(#chromeBlue)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Nós Vetoriais (Âncoras de Design) -->
    <circle cx="5" cy="19" r="2" fill="#ffffff" stroke="url(#chromeBlue)" stroke-width="2" />
    <circle cx="17" cy="7" r="2" fill="#ffffff" stroke="url(#chromeBlue)" stroke-width="2" />

